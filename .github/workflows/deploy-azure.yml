name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name momentbackendacr

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: momentbackendacr.azurecr.io/moment-backend:latest,momentbackendacr.azurecr.io/moment-backend:${{ github.sha }}

      - name: Restart App Service
        run: az webapp restart --resource-group moment-backend-rg --name moment-backend
